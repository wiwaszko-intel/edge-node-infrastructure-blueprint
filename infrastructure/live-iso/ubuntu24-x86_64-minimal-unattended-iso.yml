# AI-searchable metadata for template discovery
metadata:
  description: Minimal Ubuntu 24.04 unattended ISO installer template with automatic disk selection
  use_cases:
    - Unattended bare metal installation
    - Lab and fleet provisioning
    - Automatic install target selection
  keywords:
    - iso
    - ubuntu
    - unattended
    - installer
    - auto-disk-selection
    - largest

image:
  name: minimal-os-image-ubuntu-unattended
  version: "24.04"

target:
  os: ubuntu
  dist: ubuntu24
  arch: x86_64
  imageType: iso # Image type, valid value: [raw, iso].

disk:
  name: Default_ISO_Unattended
  # Keep path empty to enable policy-based disk selection at install time.
  path: ""
  selectionPolicy:
    strategy: largest
    excludeRemovable: true
    requireEmpty: true # Only consider disks that do not have existing partitions.
  partitionTableType: gpt # Partition table type, valid value: [gpt, mbr]
  partitions:
    - id: boot
      type: esp
      flags:
        - esp
        - boot
      start: 1MiB
      end: 513MiB
      fsType: fat32
      mountPoint: /boot/efi

    - id: rootfs
      type: linux-root-amd64
      start: 513MiB
      end: "0" # 0 means use the rest of the disk space
      fsType: ext4
      mountPoint: /

systemConfig:
  initramfs:
    template: default-initrd-unattended-x86_64.yml

  kernel:
    cmdline: "console=ttyS0,115200 console=tty0 loglevel=7 systemd.log_level=debug"

  hostname: ubuntu24-unattended

  users:
    - name: root
      startupScript: "/root/unattendedinstaller"
    - name: admin
      # Generate a SHA-512 password hash from CLI and paste it into `password`.
      # Example (recommended):
      #   openssl passwd -6
      # Example (explicit salt):
      #   openssl passwd -6 -salt "$(openssl rand -base64 12)"
      # Example resulting value format:
      #   password: "$6$<salt>$<hash>"
      # hash_algo: sha512
      groups:
        - sudo
      sudo: true
      shell: /bin/bash
      home: /home/admin

  additionalFiles:
    - local: ../config/general/isolinux/unattendedinstaller
      final: /root/unattendedinstaller
