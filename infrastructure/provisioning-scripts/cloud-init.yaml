# shellcheck disable=all

growpart:
  mode: auto
  devices: ['/']
  ignore_growroot_disabled: false

resize_rootfs: true

# Cloud-config file to start the k3s cluster.
runcmd:
  - |
    # Allow helm/kubectl access from external development system
    iptables -A INPUT -p tcp --dport 6443 -j ACCEPT
    . /etc/environment

