autoinstall:
  active-directory:
    admin-name: ''
    domain-name: ''
  apt:
    disable_components: []
    fallback: offline-install
    geoip: true
    mirror-selection:
      primary:
      - country-mirror
      - arches: &id001
        - amd64
        - i386
        uri: http://archive.ubuntu.com/ubuntu/
      - arches: &id002
        - s390x
        - arm64
        - armhf
        - powerpc
        - ppc64el
        - riscv64
        uri: http://ports.ubuntu.com/ubuntu-ports
    preserve_sources_list: false
    security:
    - arches: *id001
      uri: http://security.ubuntu.com/ubuntu/
    - arches: *id002
      uri: http://ports.ubuntu.com/ubuntu-ports
  codecs:
    install: false
  drivers:
    install: false
  user-data:
    users:
    - name: user
      shell: /bin/bash
      passwd: $6$i2P96xaVS20An4xS$wf.l8QHtdl6yPjU.Y3H0WDPQRnHqmw5vj75gShMmytqUoxz0VrkPeUy5CWDDW/oRH7q6tJhWLoAqITx/muOXK1
      groups: [adm,sudo]
      lock-passwd: false
      sudo: ALL=(ALL) NOPASSWD:ALL
    # Update the list of packages as per your requirement
    write_files:
    - path: /usr/local/packages.conf
      owner: root:root
      permissions: '0644'
      content: |
        packages:
          - vim
          - curl
          - wget
          - openssh-server
          - net-tools
          - cloud-utils
          - chrony


    - path: /usr/local/bin/first-boot-fix.sh
      owner: root:root
      permissions: '0755'
      content: |
        #!/bin/bash
        set -x 
        LOG_FILE="/var/log/first-boot-custom.log"
        exec > >(tee -a "$LOG_FILE") 2>&1

        set -a
        source /etc/environment
        set +a
        export http_proxy
        export https_proxy
        echo "--- Starting First Boot Fix: $(date) ---"
        # 1. Kill the installer's "lock" files
        rm -f /etc/cloud/cloud-init.disabled
        rm -f /etc/cloud/cloud-init.d/99-installer.cfg
        
        # 2. Set the datasource specifically for your DD image
        echo 'datasource_list: [ NoCloud, None ]' > /etc/cloud/cloud.cfg.d/99-custom-datasource.cfg
                       
        # 3. Re-arm cloud-init
        echo "policy: enabled" > /etc/cloud/ds-identify.cfg
        echo "datasource: NoCloud" >> /etc/cloud/ds-identify.cfg

        cloud-init clean --logs --machine-id
        # 4. Wait for APT locks
        echo "Checking for active APT processes..."
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock >/dev/null 2>&1; do
          sleep 2
        done

        # 5. FAST NETWORK CHECK

        echo "Testing repo connectivity..."
        until apt-get update -o Acquire::ConnectTimeout=5 -o Acquire::Retries=0 -qq > /dev/null 2>&1; do
            echo "Repositories unreachable. Checking again in 5s..."
            sleep 5
        done

        # 6 Install base packages
        sudo apt update
        sudo apt install -y ca-certificates curl gnupg
        systemctl stop systemd-timesyncd || true
        systemctl disable systemd-timesyncd || true
        sudo apt install -y chrony
        systemctl enable --now chrony

        # 7 Install Docker

        sudo install -m 0755 -d /etc/apt/keyrings

        curl -fsSL --connect-timeout 10 --max-time 60 https://download.docker.com/linux/ubuntu/gpg \
        | gpg --dearmor -o /etc/apt/keyrings/docker.gpg

        sudo chmod a+r /etc/apt/keyrings/docker.gpg

        echo \
                "deb [arch="$(dpkg --print-architecture)" signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                "$(. /etc/os-release && echo "$VERSION_CODENAME")" stable" | \
                tee /etc/apt/sources.list.d/docker.list > /dev/null
                apt update
                apt install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin -y

         usermod -aG docker user 
         systemctl restart docker
         systemctl daemon-reload
         chmod 666 /var/run/docker.sock
        # 8 k3s Install
        for i in 1 2 3; do
          curl -sfL --max-time 120 --retry 3 \
            https://get.k3s.io -o /tmp/k3s-install.sh && break
          echo "  k3s download attempt $i failed, retrying..."
          sleep 10
        done

        chmod +x /tmp/k3s-install.sh

        # 9 Install k3s server (no Traefik; add back if you want ingress)
        INSTALL_K3S_EXEC="server --disable=traefik" \
          sh /tmp/k3s-install.sh

        systemctl enable --now k3s

        mkdir -p /home/user/.kube
        cp /etc/rancher/k3s/k3s.yaml /home/user/.kube/config
        chown -R user:user /home/user/.kube
        chmod 600 /home/user/.kube/config

        grep -qxF 'export KUBECONFIG=$HOME/.kube/config' \
          /home/user/.bashrc || \
          echo 'export KUBECONFIG=$HOME/.kube/config' >> /home/user/.bashrc

        # 10 Helm installation
        curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        chmod 700 get_helm.sh
        ./get_helm.sh

        # Install CBKC kernel && Packages 
        if [ -f /usr/local/bin/installer.sh ]; then
            chmod 755 /usr/local/bin/installer.sh
            bash  /usr/local/bin/installer.sh PTL default 
        fi

        # 11 Install Intel RealSense SDK
        # ref: https://docs.ros.org/en/iron/p/librealsense2/user_docs/distribution_linux.html
        mkdir -p /etc/apt/keyrings
        KEY_ID=$(curl -sSf "https://librealsense.intel.com/Debian/apt-repo/dists/$(lsb_release -cs)/InRelease" \
          | gpg --status-fd 1 --verify 2>/dev/null | grep "NO_PUBKEY" | awk '{print $3}')
        curl -sSf "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x${KEY_ID}" \
          | gpg --dearmor | tee /etc/apt/keyrings/librealsense.gpg > /dev/null
        chmod 644 /etc/apt/keyrings/librealsense.gpg
        echo "deb [signed-by=/etc/apt/keyrings/librealsense.gpg] https://librealsense.intel.com/Debian/apt-repo $(lsb_release -cs) main" \
          | tee /etc/apt/sources.list.d/librealsense.list
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          librealsense2-dkms librealsense2 librealsense2-utils librealsense2-dev librealsense2-gl

        # 12 Self-destruct
        systemctl disable first-boot-fix.service
        rm -f /etc/systemd/system/first-boot-fix.service
        sleep 2
        poweroff 

    - path: /etc/systemd/system/first-boot-fix.service
      owner: root:root
      permissions: '0644'
      content: |
        [Unit]
        Description=Reset Cloud-Init on First Boot
        After=network.target
        Before=cloud-init.service

        [Service]
        Type=oneshot
        ExecStart=/usr/local/bin/first-boot-fix.sh
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target
    runcmd:
      - systemctl daemon-reload
      - systemctl enable first-boot-fix.service
      - systemctl start first-boot-fix.service

  kernel:
    package: linux-generic-hwe-24.04

  keyboard:
    layout: us
    toggle: null
    variant: ''
  locale: en_US.UTF-8
  network:
    ethernets:
      ens3:
        dhcp4: true
    version: 2
  oem:
    install: auto
  proxy: http://proxy-dmz.intel.com:912/
  source:
    id: ubuntu-desktop-minimal
    search_drivers: false
  ssh:
    allow-pw: true
    authorized-keys: []
    install-server: false
  storage:
    version: 1
    layout:
      name: direct
  timezone: Asia/Kuala_Lumpur
  updates: security
  version: 1
  interactive-sections: []

  late-commands:
    - curtin in-target --target=/target -- apt-get update || true
    - curtin in-target --target=/target -- apt-get upgrade -y || true
    - curtin in-target --target=/target -- sed -e 's@^GRUB_TIMEOUT_STYLE=hidden@# GRUB_TIMEOUT_STYLE=hidden@g' -e 's@^GRUB_TIMEOUT=0@GRUB_TIMEOUT=5@g' -e 's@^GRUB_CMDLINE_LINUX=\"\"@GRUB_CMDLINE_LINUX=\"console=tty0 console=ttyS0,115200n8\"@g' -i /etc/default/grub
    - curtin in-target --target=/target -- update-grub
    - curtin in-target --target=/target -- sh -c "printf '%s\n' 'http_proxy=\"http://proxy-dmz.intel.com:911\"' 'https_proxy=\"http://proxy-dmz.intel.com:912\"' 'socks_server=\"http://proxy-dmz.intel.com:1080\"' 'no_proxy=\"localhost\"' >> /etc/environment"
    - curtin in-target --target=/target -- apt list --installed > /opt/Bom-list.txt
  shutdown: poweroff

