---

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"  # this enables searching only in /.github/workflows directory
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "[gha] "
    cooldown:
      default-days: 7

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: "pip"
    directory: "/infrastructure"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
